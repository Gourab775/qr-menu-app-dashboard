<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 80px;
  height: 80px;
  overflow: hidden;
  background: transparent;
  user-select: none;
  -webkit-user-select: none;
}
.bubble {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  touch-action: none;
}
.bubble:active {
  cursor: grabbing;
}
.bubble-icon {
  color: #fff;
  font-size: 26px;
  line-height: 1;
  pointer-events: none;
}
.badge {
  position: absolute;
  top: -2px;
  right: -2px;
  min-width: 20px;
  height: 20px;
  border-radius: 10px;
  background: #ef4444;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  line-height: 1;
  pointer-events: none;
}
.badge.hidden {
  display: none;
}
</style>
</head>
<body>
<div class="bubble" id="bubble">
  <span class="bubble-icon">🍽️</span>
  <div class="badge hidden" id="badge">0</div>
</div>
<script>
(function() {
  const bubble = document.getElementById('bubble');
  const badge = document.getElementById('badge');
  let dragging = false;
  let moved = false;
  let offX = 0;
  let offY = 0;

  bubble.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    bubble.setPointerCapture(e.pointerId);
    const pos = { x: window.screenX, y: window.screenY };
    offX = e.screenX - pos.x;
    offY = e.screenY - pos.y;
    dragging = true;
    moved = false;
  });

  bubble.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const newX = e.screenX - offX;
    const newY = e.screenY - offY;
    window.moveTo(newX, newY);
    if (Math.abs(e.movementX) > 1 || Math.abs(e.movementY) > 1) {
      moved = true;
    }
  });

  bubble.addEventListener('pointerup', (e) => {
    bubble.releasePointerCapture(e.pointerId);
    dragging = false;
    if (moved) {
      const pos = { x: window.screenX, y: window.screenY };
      if (window.electronAPI && window.electronAPI.saveBubbleBounds) {
        window.electronAPI.saveBubbleBounds(pos);
      }
      moved = false;
      return;
    }
    if (window.electronAPI && window.electronAPI.bubbleClicked) {
      window.electronAPI.bubbleClicked();
    }
  });

  bubble.addEventListener('pointercancel', (e) => {
    bubble.releasePointerCapture(e.pointerId);
    dragging = false;
  });

  if (window.electronAPI && window.electronAPI.onOrderCountChanged) {
    window.electronAPI.onOrderCountChanged((count) => {
      badge.textContent = count;
      if (count > 0) {
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    });
  }
})();
</script>
</body>
</html>
